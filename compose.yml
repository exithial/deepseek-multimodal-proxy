services:
  deepseek-multimodal-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepseek-multimodal-proxy
    env_file:
      - .env
    ports:
      - "${PORT:-7777}:7777"
    volumes:
      - proxy-cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || '7777') + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  proxy-cache:
