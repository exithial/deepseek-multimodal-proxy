name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate PR
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test:unit
      
      - name: Check build
        run: npm run build
      
      - name: Validate test coverage
        run: |
          npm run test:coverage
          node -e "const fs=require('fs'); if(!fs.existsSync('coverage/lcov.info')) { console.error('Coverage report not found'); process.exit(1); } console.log('Coverage report generated');"
